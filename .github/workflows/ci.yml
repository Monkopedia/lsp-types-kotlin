name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: JVM / JS / Wasm / Linux (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install clangd (for real-server integration tests)
        run: sudo apt-get install -y clangd

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint
        run: ./gradlew ktlintCheck

      - name: Codegen reproducibility
        run: |
          ./gradlew :lsp-codegen:generate
          ./gradlew :lsp:ktlintFormat :lsp-ksrpc:ktlintFormat
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated code is out of date. Regenerate with ':lsp-codegen:generate', then ':lsp:ktlintFormat :lsp-ksrpc:ktlintFormat', and commit the result."
            git status --porcelain
            git --no-pager diff
            exit 1
          fi

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew allTests -Plsp.requireIntegrationTests=true

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-ubuntu
          path: "**/build/reports/tests/"

  apple:
    name: Apple targets (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # On a macOS host the Apple targets are buildable (the Linux/mingw/
      # androidNative targets are ignored via kotlin.native.ignoreDisabledTargets),
      # so `build` is what actually compiles and link-tests macos/ios/watchos/tvos —
      # coverage the ubuntu leg physically cannot provide.
      - name: Build (Apple + common targets)
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-macos
          path: "**/build/reports/tests/"
